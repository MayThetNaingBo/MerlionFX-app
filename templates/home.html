<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merlion Digital Bank</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #6373c2 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background: rgb(248, 246, 246);
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      z-index: 1000;
      transition: all 0.3s ease;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo img {
      height: 60px;
      border-radius: 12px;
      transition: transform 0.3s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .logo img:hover {
      transform: scale(1.05);
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      color: #2d3748;
      letter-spacing: -0.5px;
    }

    .nav-buttons {
      display: flex;
      gap: 12px;
    }

    .nav-buttons button {
      font-size: 15px;
      padding: 12px 24px;
      background: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      color: black;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
      position: relative;
      overflow: hidden;
    }

    .nav-buttons button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s;
    }

    .nav-buttons button:hover::before {
      left: 100%;
    }

    .nav-buttons button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }

   
  </style>
</head>
<body>
  <div class="floating-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <div class="header">
    <div class="logo">
      <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="Merlion Logo">
      <div class="logo-text">MERLION</div>
    </div>

    <div class="nav-buttons">
      <button type="button" onclick="window.location.href='/stock'">📈 Stocks</button>
      <button type="button" onclick="window.location.href='/fx'">💱 FX</button>
      <button type="button" onclick="window.location.href='/metals'">🥇 Metals</button>
    </div>
  </div>

 
</body>
</html>
