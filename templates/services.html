<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Merlion FX Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #dfefff, #f8f9fa);
      font-family: Arial, sans-serif;
    }
    .card {
      border-radius: 20px;
      box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
    }
    .card-header {
      background-color: #0070ba;
      color: white;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
    }
  </style>
</head>
<body>

  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card w-75">
      <div class="card-header text-center">
        <h2>👋 Welcome to Merlion FX Dashboard 🤗</h2>
      </div>
      <div class="card-body">
        <p><strong>🌐 Email:</strong> {{ fEmail }}</p>
        <p><strong>🛡️ PayPal ID:</strong> {{ fPayerID }}</p>
        <p><strong>💳 Balance:</strong> {{ fCCY }} {{ fBalance }}</p>
        <hr>
        <div class="text-center">
          <a href="/create_order" class="btn btn-outline-primary">💶 Buy Foreign Currency</a>
           <a href="/chart" class="btn btn-outline-primary">
  📊 View FX Trend Chart
</a>
        </div>
      </div>
    </div>
  </div>
  

</body>
</html>
