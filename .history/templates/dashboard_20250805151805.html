<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Merlion FX Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
<div class="container py-4">
  <div class="card mb-4 shadow">
    <div class="card-header bg-primary text-white">
      <h4>👋 Welcome to Merlion FX Dashboard 🤗</h4>
    </div>
    <div class="card-body">
      <p><strong>🌐 Email:</strong> {{ fEmail }}</p>
      <p><strong>🛡️ PayPal ID:</strong> {{ fPayerID }}</p>
      <p><strong>💳 Balance:</strong> {{ fCCY }} {{ fBalance }}</p>
    </div>
  </div>

  <!-- 💱 Buy FX -->
  <div class="card mb-4 shadow">
    <div class="card-header bg-info text-white"><strong>💱 Buy Foreign Currency</strong></div>
    <div class="card-body">
      <a href="/create_order" class="btn btn-outline-dark">Buy via PayPal</a>
    </div>
  </div>

  <!-- 📊 FX Trend Chart -->
  <div class="card mb-4 shadow">
    <div class="card-header bg-info text-white"><strong>📊 FX Trend Chart</strong></div>
    <div class="card-body">
      <select id="fxPairChart" class="form-select mb-2">
        {% for pair in fxPairs %}<option value="{{ pair }}">{{ pair[:3] }}/{{ pair[3:] }}</option>{% endfor %}
      </select>
      <select id="rangeChart" class="form-select mb-2">
        <option value="1">1 Day</option>
        <option value="7">7 Days</option>
        <option value="30" selected>30 Days</option>
      </select>
      <canvas id="chartCanvas" height="100"></canvas>
    </div>
  </div>

  <!-- 🇲🇲 MMK Converter -->
  <div class="card mb-4 shadow">
    <div class="card-header bg-success text-white"><strong>🇲🇲 MMK Converter</strong></div>
    <div class="card-body">
      <select id="cbmCurrency" class="form-select mb-2">
        {% for ccy in cbmCurrencies %}<option value="{{ ccy }}">{{ ccy }}</option>{% endfor %}
      </select>
      <button class="btn btn-success" onclick="fetchCBMRate()">💱 Get Exchange Rate</button>
      <div id="cbmResult" class="alert alert-info mt-2 d-none"></div>
    </div>
  </div>

  <!-- 📢 FX News -->
  <div class="card mb-4 shadow">
    <div class="card-header bg-warning"><strong>📢 Latest FX News</strong></div>
    <div class="card-body">
      <div id="newsBox" class="alert alert-light">Loading news...</div>
    </div>
  </div>

  <!-- 🔮 Forecast -->
  <div class="card shadow">
    <div class="card-header bg-primary text-white"><strong>🔮 Currency Forecast (Next-Day)</strong></div>
    <div class="card-body">
      <select id="forecastPair" class="form-select mb-2">
        {% for pair in fxPairs %}<option value="{{ pair }}">{{ pair[:3] }}/{{ pair[3:] }}</option>{% endfor %}
      </select>
      <div id="forecastBox" class="alert alert-info d-none"></div>
    </div>
  </div>
</div>

<script>
  $(document).ready(function () {
    $('#fxPairChart, #rangeChart, #forecastPair, #cbmCurrency').select2();

    // Trend Chart
    function loadChart() {
      const pair = $('#fxPairChart').val();
      const range = $('#rangeChart').val();
      $.get(`/api/chart_data?pair=${pair}&range=${range}`, function (data) {
        const ctx = document.getElementById('chartCanvas').getContext('2d');
        if (window.chart) window.chart.destroy();
        window.chart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: data.dates,
            datasets: [{
              label: `FX Rate (${pair})`,
              data: data.prices,
              borderColor: 'blue',
              borderWidth: 2,
              fill: false
            }]
          }
        });
      });
    }

    // CBM MMK
    window.fetchCBMRate = function () {
      const currency = $('#cbmCurrency').val();
      $.get(`/get_cbm_rate?currency=${currency}`, function (data) {
        $('#cbmResult').removeClass("d-none").html(`1 ${data.currency} = ${data.rate} MMK`);
      });
    }

    // Forecast
    function loadForecast() {
      const pair = $('#forecastPair').val();
      $.get(`/api/forecast?pair=${pair}`, function (data) {
        if (data.predicted_rate) {
          $('#forecastBox').removeClass('d-none').html(`<strong>📊 Tomorrow's predicted rate:</strong> ${data.predicted_rate}`);
        } else {
          $('#forecastBox').removeClass('d-none').html("⚠️ Forecast unavailable.");
        }
      });
    }

    // FX News
    function loadNews() {
      $.get("/api/news", function (data) {
        const box = $('#newsBox');
        if (data.articles.length === 0) {
          box.html("No news available at the moment.");
        } else {
          box.html(data.articles.map(a => `<div><a href="${a.url}" target="_blank">📰 ${a.title}</a></div>`).join(''));
        }
      });
    }

    $('#fxPairChart, #rangeChart').change(loadChart);
    $('#forecastPair').change(loadForecast);
    loadChart();
    loadForecast();
    loadNews();
  });
</script>
</body>
</html>
