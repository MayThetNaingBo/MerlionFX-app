<!DOCTYPE html>
<html>
<head>
  <title>FX Trend Chart</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- jQuery (must be before Select2!) -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- Select2 CSS + JS -->
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
</head>

<body class="container mt-5">
  <h3>📈 FX Trend Chart</h3>

  <label>Choose FX Pair</label>
  <select id="fxPair" class="form-select mb-3">
    {% for pair in fxPairs %}
      <option value="{{ pair }}">{{ pair[:3] }}/{{ pair[3:] }}</option>
    {% endfor %}
  </select>

  <label>Time Range</label>
  <select id="range" class="form-select mb-3">
    <option value="1">1 Day</option>
    <option value="7">7 Days</option>
    <option value="30" selected>30 Days</option>
  </select>

  <canvas id="fxChart" height="100"></canvas>

  <script>
  function loadChart() {
    const pair = $('#fxPair').val();
    const range = $('#range').val();

    $.get(`/api/chart_data?pair=${pair}&range=${range}`, function (data) {
      if (!data.dates.length || !data.prices.length) {
        alert("⚠️ No data available for the selected range. Try a longer time period.");
        return;
      }

      const ctx = document.getElementById('fxChart').getContext('2d');
      if (window.chart) window.chart.destroy();

      window.chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: data.dates,
          datasets: [{
            label: `FX Rate (${pair})`,
            data: data.prices,
            borderColor: 'blue',
            borderWidth: 2,
            fill: false
          }]
        },
        options: {
          plugins: {
            legend: {
              display: false
            }
          }
        }
      });
    });
  }

  $('#fxPair, #range').change(loadChart);

  $(document).ready(function () {
    $('#fxPair').select2({
      width: '200px',
      placeholder: "Select FX Pair"
    });

    loadChart();
  });
</script>

</body>
</html>
