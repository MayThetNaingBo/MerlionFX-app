<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Merlion FX Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f4faff;
      padding: 20px;
    }
    .section-card {
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      padding: 15px;
      background: white;
      height: 100%;
    }
    .section-title {
      font-weight: bold;
      margin-bottom: 15px;
    }
    iframe {
      border: none;
      width: 100%;
      height: 350px;
    }
  </style>
</head>
<body>
  <div class="container-fluid">
    <!-- Top Row: Buy FX and FX Trend Chart -->
    <div class="row mb-4">
      <div class="col-md-6">
        <div class="section-card">
          <div class="section-title">💱 Buy FX Currency</div>
          <iframe src="/templates/create_order.html"></iframe>
        </div>
      </div>
      <div class="col-md-6">
        <div class="section-card">
          <div class="section-title">📊 FX Trend Chart</div>
          <iframe src="/chart"></iframe>
        </div>
      </div>
    </div>

    <!-- Bottom Row: MMK Converter, News, Forecast (stacked in left col) -->
    <div class="row">
      <div class="col-md-6 d-flex flex-column gap-4">
        <div class="section-card">
          <div class="section-title">🇲🇲 MMK Converter</div>
          <iframe src="/cbm"></iframe>
        </div>
        <div class="section-card">
          <div class="section-title">📣 FX News</div>
          <iframe src="/news"></iframe>
        </div>
        <div class="section-card">
          <div class="section-title">🔮 Currency Forecast</div>
          <iframe src="/forecast"></iframe>
        </div>
      </div>
      <div class="col-md-6">
        <!-- Optional extra space for future components or summary stats -->
        <div class="section-card h-100 text-center d-flex align-items-center justify-content-center text-muted">
          <p>You can add more widgets or summary stats here later.</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
