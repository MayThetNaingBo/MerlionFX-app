<!DOCTYPE html>
<html>
<head>
  <title>Currency Forecast</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    body {
      background-color: #f0f8ff;
      padding-top: 40px;
    }
    .card {
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card p-4">
      <h3 class="mb-4 text-primary">📈 Currency Forecast (Next-Day)</h3>

      <div class="mb-3">
        <label for="pair">Choose FX Pair</label>
        <select class="form-select" id="pair">
          {% for pair in fxPairs %}
            <option value="{{ pair }}">{{ pair[:3] }}/{{ pair[3:] }}</option>
          {% endfor %}
        </select>
      </div>

      <button class="btn btn-primary" onclick="getForecast()">🔮 Get Forecast</button>

      <div class="mt-4" id="result" style="display:none;">
        <p><strong>Last Known Rate:</strong> <span id="last"></span></p>
        <p><strong>Predicted Tomorrow Rate:</strong> <span id="predicted"></span></p>
      </div>
    </div>
  </div>

  <script>
    function getForecast() {
      const pair = $('#pair').val();

      $.get(`/api/forecast?pair=${pair}`, function (data) {
        if (data.forecast && data.today) {
          $('#result').show();
          $('#last').text(data.today.toFixed(4));
          $('#predicted').text(data.forecast.toFixed(4));
        } else {
          alert("⚠️ Failed to fetch forecast.");
        }
      });
    }
  </script>
</body>a
</html>
