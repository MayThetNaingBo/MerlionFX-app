<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Buy SGD with MMK (CBM Rate)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <s
</head>
<body class="bg-light">

<div class="container mt-5">
  <h3 class="mb-4">Buy SGD using MMK (via CBM Official Rate)</h3>
  <form method="POST" action="/process_cbm_order" id="cbmForm">
    <input type="hidden" name="currency" value="SGD">

    <!-- Currency Dropdown (for viewing only) -->
    <div class="mb-3">
      <label class="form-label"><strong>View CBM Exchange Rate</strong></label>
      <select class="form-select" id="currencySelect">
        {% for code in all_rates.keys() %}
          <option value="{{ code }}" {% if code == default_currency %}selected{% endif %}>{{ code }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Rate Display -->
    <div class="mb-3">
      <label class="form-label"><strong>Current Rate (MMK per 1 unit)</strong></label>
      <input type="text" id="rateDisplay" class="form-control" readonly>
    </div>

    <!-- MMK Amount -->
    <div class="mb-3">
      <label class="form-label"><strong>Amount (MMK)</strong></label>
      <input type="number" id="mmkAmount" name="mmkAmount" class="form-control" required placeholder="e.g. 50000">
    </div>

    <!-- Hidden real transaction rate -->
    <input type="hidden" name="rate" id="hiddenRate">

    <button type="button" class="btn btn-outline-primary" id="confirmBtn">Proceed To Payment</button>
  </form>
</div>

<!-- Modal -->
<div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="confirmModalLabel">Confirm Your MMK Conversion</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p><strong>Purchase Amount:</strong> <span id="modalMMK"></span></p>
        <p><strong>Exchange Rate:</strong> <span id="modalRate"></span></p>
        <hr>
        <p><strong>Total Amount (SGD):</strong> <span id="modalTotal" class="fw-bold text-success"></span></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="finalSubmitBtn">Confirm & Pay</button>
      </div>
    </div>
  </div>
</div>

<!-- JS -->
<script>
  $(document).ready(function () {
    // Load rate on selection
    $('#currencySelect').on('change', function () {
      const selected = $(this).val();
      $.get("/get_cbm_rate", { currency: selected }, function (data) {
        if (data.rate) {
          $('#rateDisplay').val(data.rate);
        } else {
          $('#rateDisplay').val('');
          alert("Unable to fetch rate.");
        }
      });
    }).trigger('change'); // Load once on page load

    $('#confirmBtn').on('click', function () {
      const selected = $('#currencySelect').val();
      if (selected !== "SGD") {
        alert("⚠️ Sorry! Only MMK → SGD purchase is allowed.");
        return;
      }

      const mmk = parseFloat($('#mmkAmount').val());
      const rate = parseFloat($('#rateDisplay').val());

      if (isNaN(mmk) || isNaN(rate) || mmk <= 0) {
        alert("Please enter a valid MMK amount.");
        return;
      }

      const sgd = (mmk / rate).toFixed(2);

      $('#modalMMK').text(`${mmk} MMK`);
      $('#modalRate').text(`1 SGD = ${rate} MMK`);
      $('#modalTotal').text(`SGD ${sgd}`);
      $('#hiddenRate').val(rate);

      new bootstrap.Modal(document.getElementById('confirmModal')).show();
    });

    $('#finalSubmitBtn').on('click', function () {
      $('#cbmForm').submit();
    });
  });
</script>

<!-- Back to Dashboard -->
<div class="container text-center mt-5">
  <a href="/services" class="btn btn-outline-primary">Back to Dashboard</a>
</div>
</body>
</html>
