<!DOCTYPE html>
<html>
<head>
  <title>FX Fluctuation Analysis</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<div class="container mt-5">
  <h2 class="mb-4">📉 FX Fluctuation Analysis</h2>

  <div class="row mb-3">
    <div class="col-md-4">
      <label for="base" class="form-label">Base Currency</label>
      <select class="form-select" id="base">
        <option>USD</option>
        <option>EUR</option>
        <option>SGD</option>
      </select>
    </div>
    <div class="col-md-8">
      <label for="symbols" class="form-label">Compare Against (comma-separated)</label>
      <input type="text" class="form-control" id="symbols" value="SGD,EUR,AUD">
    </div>
  </div>

  <button class="btn btn-primary mb-4" onclick="loadFluctuation()">Load Fluctuation</button>

  <canvas id="fluctuationChart" height="100"></canvas>
</div>

<script>
function loadFluctuation() {
  const base = document.getElementById("base").value;
  const symbols = document.getElementById("symbols").value;

  fetch(`/api/fluctuation_data?base=${base}&symbols=${symbols}`)
    .then(res => res.json())
    .then(data => {
      const labels = Object.keys(data.rates);
      const percentageChanges = labels.map(sym => data.rates[sym].change_pct);

      const ctx = document.getElementById('fluctuationChart').getContext('2d');
      if (window.fluctuationChart) window.fluctuationChart.destroy();

      window.fluctuationChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: `Change % from ${base}`,
            data: percentageChanges,
            backgroundColor: 'rgba(54, 162, 235, 0.6)'
          }]
        },
        options: {
          plugins: {
            legend: { display: false }
          },
          scales: {
            y: { beginAtZero: true, ticks: { callback: v => v + "%" } }
          }
        }
      });
    });
}
</script>
</body>
</html>
