<!DOCTYPE html>
<html>
<head>
  <title>Currency Forecast</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <!-- Select2 CSS -->
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

<!-- Select2 JS (after jQuery) -->
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

</head>
<body class="bg-light">

<div class="container mt-5">
  <h3 class="mb-4">Currency Forecast ( Next Day )</h3>
      <div class="mb-3">
      <label class="form-label"><strong>Choose FX Pair</strong></label>
        <select class="form-select" id="pair">
          {% for pair in fxPairs %}
            <option value="{{ pair }}">{{ pair[:3] }}/{{ pair[3:] }}</option>
          {% endfor %}
        </select>
      </div>

      <button class="btn btn-outline-primary" onclick="getForecast()">Get Forecast</button>

      <div class="mt-4" id="result" style="display:none;">
        <p><strong>Last Known Rate:</strong> 1 <span id="baseCurrency"></span> = <span id="last"></span> <span id="quoteCurrency"></span></p>
<p><strong>Predicted Rate (Tomorrow):</strong> 1 <span id="baseCurrency2"></span> = <span id="predicted"></span> <span id="quoteCurrency2"></span></p>

      </div>
    </div>
  </div>

  <script>
  $(document).ready(function () {
    $('#pair').select2({ placeholder: "Search FX pair", width: '100%' });
  });

  function getForecast() {
    const pair = $('#pair').val();  // e.g. "AED/AUD"
    const [base, quote] = pair.split('/');

    $.get(`/api/forecast?pair=${pair}`, function (data) {
      if (data.predicted_rate) {
        $('#result').show();
        $('#last').html(`<strong>Last Known Rate:</strong> 1 ${base} = ${data.last_known} ${quote}`);
        $('#predicted').html(`<strong>Predicted Rate (Tomorrow):</strong> 1 ${base} = ${data.predicted_rate} ${quote}`);
      } else {
        alert("⚠️ Failed to fetch forecast.");
      }
    });
  }
</script>

</script>
<div class="container text-center mt-5">
  <a href="/services" class="btn btn-outline-primary">Back to Dashboard</a>
</div>

</body>
</html>
