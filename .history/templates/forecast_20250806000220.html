<!DOCTYPE html>
<html>
<head>
  <title>Currency Forecast</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background-color: #f0f8ff;
      padding-top: 40px;
    }
    .card {
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
    }
    canvas {
      max-height: 400px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card p-4">
      <h3 class="mb-4 text-primary">📈 Currency Forecast (Next-Day)</h3>

      <div class="mb-3">
        <label for="pair">Choose FX Pair</label>
        <select class="form-select" id="pair">
          {% for pair in fxPairs %}
            <option value="{{ pair }}">{{ pair[:3] }}/{{ pair[3:] }}</option>
          {% endfor %}
        </select>
      </div>

      <button class="btn btn-primary" onclick="getForecast()">🔮 Get Forecast</button>

      <div class="mt-4" id="result" style="display:none;">
        <p><strong>Last Known Rate:</strong> <span id="last"></span></p>
        <p><strong>Predicted Tomorrow Rate:</strong> <span id="predicted"></span></p>
        <canvas id="forecastChart" class="mt-3"></canvas>
      </div>
    </div>
  </div>

  <script>
    let chart;

    function getForecast() {
      const pair = $('#pair').val();

      $.get(`/api/forecast?pair=${pair}`, function (data) {
        if (data.forecast && data.today) {
          $('#result').show();
          $('#last').text(data.today);
          $('#predicted').text(data.forecast);

          const labels = [];
          const values = [];

          const todayRate = parseFloat(data.today);
          const forecastRate = parseFloat(data.forecast);

          for (let i = 1; i <= 30; i++) {
            labels.push("Day " + i);
            values.push(null);  // Fill with null for chart padding
          }

          labels.push("Tomorrow");
          values.push(forecastRate); // Show prediction at the end

          // Replace chart if exists
          if (chart) chart.destroy();

          const ctx = document.getElementById('forecastChart').getContext('2d');
          chart = new Chart(ctx, {
            type: 'line',
            data: {
              labels: labels,
              datasets: [
                {
                  label: `📉 Last Rate (${pair})`,
                  data: [...Array(30).fill(null), todayRate],
                  borderColor: 'blue',
                  backgroundColor: 'rgba(0,123,255,0.1)',
                  borderWidth: 2,
                  fill: true,
                  tension: 0.3
                },
                {
                  label: `🔮 Predicted (${pair})`,
                  data: [...Array(30).fill(null), forecastRate],
                  borderColor: 'green',
                  borderWidth: 2,
                  pointStyle: 'circle',
                  pointRadius: 5,
                  fill: false,
                  borderDash: [5, 5]
                }
              ]
            },
            options: {
              responsive: true,
              plugins: {
                legend: {
                  labels: { color: '#333' }
                }
              },
              scales: {
                y: {
                  beginAtZero: false
                }
              }
            }
          });
        } else {
          alert("⚠️ Failed to fetch forecast.");
        }
      });
    }
  </script>
</body>
</html>
