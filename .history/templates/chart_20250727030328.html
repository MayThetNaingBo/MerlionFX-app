<!DOCTYPE html>
<html>
<head>
  <title>FX Trend Chart</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- Select2 CSS + JS -->
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

  <style>
    body {
      background: #eaf4ff;
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 90%;
      max-width: 1000px;
      height: 90vh;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
    }

    .card-header {
      background-color: #0d6efd;
      color: white;
      padding: 1rem 1.5rem;
    }

    .card-body {
      flex: 1;
      padding: 1rem 1.5rem;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .form-label {
      font-weight: 600;
    }

    .form-select, .select2-container {
      width: 100% !important;
    }

    canvas {
      flex-grow: 1;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h4 class="mb-0">📈 FX Trend Chart</h4>
    </div>
    <div class="card-body">
      <div class="mb-3">
        <label for="fxPair" class="form-label">Choose FX Pair</label>
        <select id="fxPair" class="form-select">
          {% for pair in fxPairs %}
            <option value="{{ pair }}">{{ pair[:3] }}/{{ pair[3:] }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="mb-3">
        <label for="range" class="form-label">Time Range</label>
        <select id="range" class="form-select">
          <option value="1">1 Day</option>
          <option value="7">7 Days</option>
          <option value="30" selected>30 Days</option>
        </select>
      </div>

      <canvas id="fxChart" height="100"></canvas>
    </div>
  </div>

  <script>
    function loadChart() {
      const pair = $('#fxPair').val();
      const range = $('#range').val();

      $.get(`/api/chart_data?pair=${pair}&range=${range}`, function (data) {
        if (!data.dates.length || !data.prices.length) {
          alert("⚠️ No data available for the selected range. Try a longer time period.");
          return;
        }

        const ctx = document.getElementById('fxChart').getContext('2d');
        if (window.chart) window.chart.destroy();

        window.chart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: data.dates,
            datasets: [{
              label: `FX Rate (${pair})`,
              data: data.prices,
              borderColor: 'blue',
              borderWidth: 2,
              fill: false,
              pointRadius: 3,
              pointHoverRadius: 6,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                display: false
              }
            },
            scales: {
              x: {
                ticks: {
                  maxTicksLimit: 7
                }
              }
            }
          }
        });
      });
    }

    $(document).ready(function () {
      $('#fxPair').select2({
        placeholder: "Select FX Pair"
      });

      $('#fxPair, #range').change(loadChart);
      loadChart();
    });
  </script>
</body>
</html>
