<!DOCTYPE html>
<html>
<head>
  <title>Buy FX - Merlion</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

  <!-- Bootstrap JS (for modal) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <style>
     .custom-gradient-button {
  font-size: 15px;
  padding: 12px 24px;
  background: white;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  color: black;
  font-weight: 600;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
  position: relative;
  overflow: hidden;
  text-decoration: none;
  display: inline-block;
}

.custom-gradient-button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
  transition: left 0.5s;
}

.custom-gradient-button:hover::before {
  left: 100%;
}

.custom-gradient-button:hover {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
}
.custom-modal-header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border-bottom: 3px solid #ddd;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
  text-align: center;
  position: relative;
}

.custom-modal-header .modal-title {
  width: 100%;
  text-align: center;
  font-weight: bold;
}

.custom-modal-header .btn-close {
  position: absolute;
  right: 1rem;
  top: 1rem;
  filter: brightness(0) invert(1); /* makes close icon white */
}

  </style>

<script>
  $(document).ready(function() {
    $('#currencySelect').select2({
      placeholder: "Search currency pair",
      width: '100%'
    });

    $('#currencySelect').on('change', function () {
      const selectedPair = $(this).val();
      $.get("/get_fx_rate", { pair: selectedPair }, function (data) {
        if (data.rate) {
          $('input[name="itemUnitAmount"]').val(data.rate.toFixed(5));
        } else {
          alert("Could not fetch FX rate.");
        }
      });
    });

    $('#confirmBtn').on('click', function (e) {
      e.preventDefault();

      const selectedPair = $('#currencySelect').val();
      const unitPrice = parseFloat($('input[name="itemUnitAmount"]').val());
      const quantity = parseFloat($('input[name="itemQuantity"]').val());

      if (isNaN(unitPrice) || isNaN(quantity) || unitPrice <= 0 || quantity <= 0) {
        alert("⚠️ Please enter a valid unit price and quantity.");
        return;
      }

      // Allow only purchases of currency pairs ending in SGD (e.g., USD/SGD)
      if (!selectedPair.endsWith("SGD")) {
        alert("❌ You can only purchase currencies quoted in SGD (e.g., USD/SGD).");
        return;
      }

      const total = (unitPrice * quantity).toFixed(2);
      $('#modalCurrency').text($('#currencySelect option:selected').text());
      $('#modalQuantity').text(quantity);
      const baseCurrency = selectedPair.split('/')[0];
$('#modalUnitPrice').text(`1 ${baseCurrency} = ${unitPrice.toFixed(5)} SGD`);

      $('#modalTotal').text(`SGD ${total}`);

      const myModal = new bootstrap.Modal(document.getElementById('confirmModal'));
      myModal.show();
    });

    $('#finalSubmitBtn').on('click', function () {
      $('#fxForm').submit();
    });
  });
</script>

</head>

<body class="bg-light">
  <div class="container mt-5">
    
   <div class="d-flex justify-content-between align-items-center mb-4">
  <h3 class="mb-0">💶 Buy Foreign Currency</h3>
  <a href="/services" class="custom-gradient-button">Back to Dashboard</a>
</div>

    <form method="POST" action="/process_order" id="fxForm">
      <input type="hidden" name="customerEmailAdd" value="{{ fEmail }}">
      <input type="hidden" name="invoiceID" value="{{ finvoiceID }}">

      <div class="mb-3">
        <label class="form-label"><strong>Choose Currency</strong></label>
        <select class="form-select" id="currencySelect" name="itemName" required>
          {% for pair in fxPairs %}
            <option value="{{ pair }}" {% if pair == defaultPair %}selected{% endif %}>
              {{ pair[:3] }}/{{ pair[3:] }}
            </option>
          {% endfor %}
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label"><strong>Unit Price</strong></label>
        <input type="number" step="0.0001" name="itemUnitAmount"
               class="form-control" required
               value="{{ defaultRate }}" placeholder="e.g. 1.27">
      </div>

      <div class="mb-3">
        <label class="form-label"><strong>Amount</strong> (Foreign Currency)</label>
        <input type="number" name="itemQuantity" class="form-control" required placeholder="e.g. 100">
      </div>

      <div class="mb-4">
        <label class="form-label"><strong>Reason</strong></label>
        <input type="text" name="itemDescription" class="form-control" placeholder="e.g. For Travelling">
      </div>

      <button type="button" class="custom-gradient-button" id="confirmBtn">Proceed To Payment</button>
      <br>
      <br>
     
      
    </form>
  </div>

  <!-- Confirmation Modal -->
  <div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header custom-modal-header w-100 justify-content-center">

          <h5 class="modal-title" id="confirmModalLabel">Confirm Your FX Purchase</h5>
          
        </div>
        <div class="modal-body">
          <p><strong>Currency:</strong> <span id="modalCurrency"></span></p>
          <p><strong>Purchase Amount:</strong> <span id="modalQuantity"></span></p>
          <p><strong>Exchange Rate:</strong> <span id="modalUnitPrice"></span></p>

          <hr>
          <p><strong>Total Amount (SGD):</strong> <span id="modalTotal" class="fw-bold text-success"></span></p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-success" id="finalSubmitBtn">Confirm and Pay</button>
          
        </div>
      </div>
      
    </div>
     
  </div>
  

</body>
</html>
