<!DOCTYPE html>
<html>
<head>
  <title>FX Trend Chart</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- jQuery (before Select2) -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- Select2 CSS + JS -->
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

  <style>
    body {
      background: #f0f8ff;
      padding-top: 30px;
    }
    .card {
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
    }
    .select2-container {
      width: 100% !important;
    }
    #fxChart {
      max-height: 400px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0">📈 FX Trend Chart</h4>
      </div>
      <div class="card-body">
        <div class="mb-3">
          <label for="fxPair" class="form-label">💱 Choose FX Pair</label>
          <select id="fxPair" class="form-select">
            {% for pair in fxPairs %}
              <option value="{{ pair }}">{{ pair[:3] }}/{{ pair[3:] }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-4">
          <label for="range" class="form-label">🕒 Time Range</label>
          <select id="range" class="form-select">
            <option value="1">1 Day</option>
            <option value="7">7 Days</option>
            <option value="30" selected>30 Days</option>
          </select>
        </div>

        <canvas id="fxChart" class="w-100" height="100"></canvas>
      </div>
    </div>
  </div>

  <script>
    function loadChart() {
      const pair = $('#fxPair').val();
      const range = $('#range').val();

      $.get(`/api/chart_data?pair=${pair}&range=${range}`, function (data) {
        if (!data.dates.length || !data.prices.length) {
          alert("⚠️ No data available for the selected range.");
          return;
        }

        const ctx = document.getElementById('fxChart').getContext('2d');
        if (window.chart) window.chart.destroy();

        window.chart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: data.dates,
            datasets: [{
              label: `FX Rate (${pair})`,
              data: data.prices,
              borderColor: 'blue',
              backgroundColor: 'rgba(0, 123, 255, 0.1)',
              borderWidth: 2,
              fill: true,
              tension: 0.3
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                display: true,
                labels: { color: '#333' }
              },
              tooltip: {
                callbacks: {
                  label: function(context) {
                    return `Rate: ${context.raw.toFixed(4)}`;
                  }
                }
              }
            },
            scales: {
              x: { ticks: { color: '#555' } },
              y: {
                ticks: { color: '#555' },
                beginAtZero: false
              }
            }
          }
        });
      });
    }

    $(document).ready(function () {
      $('#fxPair').select2({ placeholder: "Select FX Pair" });

      $('#fxPair, #range').change(loadChart);

      // Trigger once after page load
      setTimeout(() => {
        $('#fxPair').trigger('change');
      }, 100);
    });
  </script>
</body>
</html>
