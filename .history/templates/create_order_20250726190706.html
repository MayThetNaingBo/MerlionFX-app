<!DOCTYPE html>
<html>
<head>
  <title>Buy FX - Merlion</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <h3 class="mb-4">Buy Foreign Currency</h3>
    <form method="POST" action="/process_order">
      <input type="hidden" name="customerEmailAdd" value="{{ fEmail }}">
      <input type="hidden" name="invoiceID" value="{{ finvoiceID }}">

      <div class="mb-3">
        <label class="form-label">Choose Currency</label>
        <select class="form-select" name="itemName" required>
          <option value="EUR/SGD">EUR/SGD</option>
          <option value="AUD/SGD">AUD/SGD</option>
          <option value="USD/SGD">USD/SGD</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Unit Price (SGD)</label>
        <input type="number" step="0.01" name="itemUnitAmount" class="form-control" required placeholder="e.g. 1.45">
      </div>

      <div class="mb-3">
        <label class="form-label">Quantity (Foreign Currency)</label>
        <input type="number" name="itemQuantity" class="form-control" required placeholder="e.g. 100">
      </div>

      <div class="mb-3">
        <label class="form-label">Description</label>
        <input type="text" name="itemDescription" class="form-control" placeholder="e.g. Euro for travel">
      </div>

      <button type="submit" class="btn btn-primary">Pay with PayPal</button>
    </form>
  </div>
</body>
</html>
