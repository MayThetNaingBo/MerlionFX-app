<!DOCTYPE html>
<html>
<head>
  <title>FX Fluctuation Analysis</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<div class="container mt-5">
  <h2 class="mb-4">📉 FX Fluctuation Analysis</h2>

  <div class="row mb-3">
    <div class="col-md-4">
      <label for="base" class="form-label">Base Currency</label>
      <select class="form-select" id="base">
        <option>USD</option>
        <option>EUR</option>
        <option>SGD</option>
      </select>
    </div>
    <div class="col-md-8">
      <label for="symbols" class="form-label">Compare Against (comma-separated)</label>
      <input type="text" class="form-control" id="symbols" value="SGD,EUR,AUD">
    </div>
  </div>

  <button class="btn btn-primary mb-4" onclick="loadFluctuation()">Load Fluctuation</button>

  <canvas id="fluctuationChart" height="100"></canvas>
  <div id="results" class="mt-4"></div>
</div>

<script>
let chartInstance = null;

function loadFluctuation() {
  const base = document.getElementById("base").value;
  const symbols = document.getElementById("symbols").value;

  fetch(`/api/fluctuation_data?base=${base}&symbols=${symbols}`)
    .then(res => res.json())
    .then(data => {
      if (!data || !data.rates || Object.keys(data.rates).length === 0) {
        alert("❌ No fluctuation data found. Try different currencies.");
        return;
      }

      const results = [];
      const labels = [];
      const values = [];

      for (const [currency, stats] of Object.entries(data.rates)) {
        results.push(`
          <li><strong>${currency}</strong>: 
          Change: ${stats.change.toFixed(4)} | 
          Change %: ${stats.change_pct.toFixed(2)}%</li>
        `);
        labels.push(currency);
        values.push(stats.change_pct);
      }

      document.getElementById("results").innerHTML = `<ul>${results.join('')}</ul>`;

      // Destroy previous chart if exists
      if (chartInstance) {
        chartInstance.destroy();
      }

      // Draw chart
      const ctx = document.getElementById('fluctuationChart').getContext('2d');
      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Change %',
            data: values,
            backgroundColor: 'rgba(54, 162, 235, 0.6)',
            borderColor: 'rgba(54, 162, 235, 1)',
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          scales: {
            y: {
              beginAtZero: true,
              title: {
                display: true,
                text: '% Change'
              }
            }
          }
        }
      });
    })
    .catch(err => {
      alert("🚫 Failed to load data.");
      console.error(err);
    });
}
</script>

</body>
</html>
