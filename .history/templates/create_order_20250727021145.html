<!DOCTYPE html>
<html>
<head>
  <title>Buy FX - Merlion</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Add jQuery and Select2 for searchable dropdown -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

  <script>
    $(document).ready(function() {
      $('#currencySelect').select2({
        placeholder: "Search currency pair",
        width: '100%'
      });

      // Fetch rate when currency changes
      $('#currencySelect').on('change', function () {
        const selectedPair = $(this).val(); // e.g. "EURSGD"
        $.get("/get_fx_rate", { pair: selectedPair }, function (data) {
          if (data.rate) {
            $('input[name="itemUnitAmount"]').val(data.rate.toFixed(5));
          } else {
            alert("⚠️ Could not fetch FX rate.");
          }
        });
      });
    });
  </script>
</head>

<body class="bg-light">
  <div class="container mt-5">
    <h3 class="mb-4">Buy Foreign Currency</h3>
    <form method="POST" action="/process_order">
      <input type="hidden" name="customerEmailAdd" value="{{ fEmail }}">
      <input type="hidden" name="invoiceID" value="{{ finvoiceID }}">

      <!-- Dynamic FX Dropdown -->
      <div class="mb-3">
        <label class="form-label">Choose Currency</label>
        <select class="form-select" id="currencySelect" name="itemName" required>
          {% for pair in fxPairs %}
            <option value="{{ pair }}" {% if pair == defaultPair %}selected{% endif %}>
              {{ pair[:3] }}/{{ pair[3:] }}
            </option>
          {% endfor %}
        </select>
      </div>

      <!-- Current Unit Rate -->
      <div class="mb-3">
        <label class="form-label">Unit Price (SGD)</label>
        <input type="number" step="0.0001" name="itemUnitAmount"
               class="form-control" required
               value="{{ defaultRate }}" placeholder="e.g. 1.45">
      </div>

      <!-- Quantity -->
      <div class="mb-3">
        <label class="form-label">Quantity (Foreign Currency)</label>
        <input type="number" name="itemQuantity" class="form-control" required placeholder="e.g. 100">
      </div>

      <!-- Description -->
      <div class="mb-3">
        <label class="form-label">Description</label>
        <input type="text" name="itemDescription" class="form-control" placeholder="e.g. Euro for travel">
      </div>

      <button type="submit" class="btn btn-primary">Pay with PayPal</button>
    </form>
  </div>
  <a href="/c" class="btn btn-outline-primary">
  📊 View FX Trend Chart
</a>

</body>
</html>
