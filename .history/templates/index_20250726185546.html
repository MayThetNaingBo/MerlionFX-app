<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Merlion FX App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #e8f0fe, #f8f9fa);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }
    .login-box {
      background-color: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
      text-align: center;
    }
    .btn-paypal {
      background-color: #0070ba;
      color: white;
      font-weight: bold;
    }
    .btn-paypal:hover {
      background-color: #005c9e;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2 class="mb-4">Merlion Digital Bank</h2>
    <p class="mb-4">Welcome to FX Investment Portal</p>
    <a href="/login" class="btn btn-paypal btn-lg">Login with PayPal</a>
  </div>

</body>
</html>
