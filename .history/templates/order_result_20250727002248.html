<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Success</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #fff;
    }
    h1 {
      color: green;
      font-size: 32px;
    }
    h2 {
      font-size: 18px;
    }
    .checkmark {
      font-size: 48px;
      color: green;
    }
    p {
      font-size: 18px;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #0070ba;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
    .btn:hover {
      background-color: #005c99;
    }
  </style>
</head>
<body>
  <div class="checkmark">✅</div>
  <h1>Payment Successful!</h1>
  <h2>Thank you for using Merlion FX</h2>
  <hr>

  <p><strong>Order ID:</strong> {{ fOrderID }}</p>
  <p><strong>Status:</strong> {{ fStatus }}</p>
  <p><strong>Name:</strong> {{ fName }} {{ fSurname }}</p>
  <p><strong>Email:</strong> {{ fEmail }}</p>

  <p><strong>Unit Price:</strong> SGD {{ fUnitPrice }}</p>
  <p><strong>Quantity:</strong> {{ fQuantity }}</p>
  <p><strong>Total Amount:</strong> SGD {{ fAmount }}</p>

  <p><strong>PayPal ID:</strong> {{ fPayPalID }}</p>

  <a class="btn" href="/">Back to Dashboard</a>
</body>
</html>
