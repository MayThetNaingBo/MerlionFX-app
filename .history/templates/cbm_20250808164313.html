<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MMK to SGD Conversion - Merlion FX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f7f9fc;
            font-family: Arial, sans-serif;
        }

        .header {
            background-color: #9DCAEB;
            padding: 10px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header img {
            height: 60px;
        }

        .nav-links a {
            color: black;
            font-weight: bold;
            margin-left: 20px;
            text-decoration: none;
        }

        .container {
            margin-top: 40px;
        }

        .card {
            border-radius: 10px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            background-color: #0070ba;
            color: white;
            font-weight: bold;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }

        .form-label {
            font-weight: bold;
        }

        .btn-convert {
            background-color: #0070ba;
            color: white;
            font-weight: bold;
        }

        .btn-convert:hover {
            background-color: #005ea6;
        }

        .result-text {
            font-size: 1.2rem;
            margin-top: 15px;
        }

        .conversion-box {
            padding: 30px;
        }
    </style>
</head>
<body>

<div class="header">
    <img src="{{ url_for('static', filename='images/Merlion.png') }}" alt="Merlion FX Logo">
    <div class="nav-links">
        <a href="{{ url_for('home_after_login') }}">Home</a>
        <a href="{{ url_for('services') }}">Dashboard</a>
        <a href="{{ url_for('cbm') }}">MMK Converter</a>
        <a href="{{ url_for('news') }}">News</a>
        <a href="{{ url_for('forecast') }}">Forecast</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <div class="card-header text-center">
            <h4>Convert MMK to SGD using Central Bank Rate</h4>
        </div>
        <div class="conversion-box">
            <form action="/process_cbm_order" method="post">
                <div class="mb-3">
                    <label for="currency" class="form-label">Currency</label>
                    <select class="form-select" id="currency" name="currency" required>
                        {% for symbol in cbmRates %}
                        <option value="{{ symbol }}">{{ symbol }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="rate" class="form-label">CBM Rate (MMK → SGD)</label>
                    <input type="text" class="form-control" id="rate" name="rate" placeholder="Enter CBM rate for selected currency" required>
                </div>

                <div class="mb-3">
                    <label for="mmkAmount" class="form-label">MMK Amount</label>
                    <input type="number" class="form-control" id="mmkAmount" name="mmkAmount" placeholder="Enter amount in MMK" required>
                </div>

                <button type="submit" class="btn btn-convert w-100">Convert and Buy</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
