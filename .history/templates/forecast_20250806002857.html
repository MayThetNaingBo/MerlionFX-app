<!DOCTYPE html>
<html>
<head>
  <title>Currency Forecast</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <!-- Select2 CSS -->
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

<!-- Select2 JS (after jQuery) -->
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>


  <style>
    body {
      background-color: #f0f8ff;
      padding-top: 40px;
    }
    .card {
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>
<body>
  <div class="container">
      <h3 class="mb-4 text-primary">📈 Currency Forecast (Next-Day)</h3>

      <div class="mb-3">
        <label for="pair">Choose FX Pair</label>
        <select class="form-select" id="pair">
          {% for pair in fxPairs %}
            <option value="{{ pair }}">{{ pair[:3] }}/{{ pair[3:] }}</option>
          {% endfor %}
        </select>
      </div>

      <button class="btn btn-primary" onclick="getForecast()">🔮 Get Forecast</button>

      <div class="mt-4" id="result" style="display:none;">
        <p><strong>Last Known Rate:</strong> <span id="last"></span></p>
        <p><strong>Predicted Tomorrow Rate:</strong> <span id="predicted"></span></p>
      </div>
    </div>
  </div>

  <script>
  $(document).ready(function () {
    $('#pair').select2({
      placeholder: "Search FX pair",
      width: '100%'
    });
  });

  function getForecast() {
    const pair = $('#pair').val();

    $.get(`/api/forecast?pair=${pair}`, function (data) {
      if (data.forecast && data.today) {
        $('#result').show();
        $('#last').text(data.today);
        $('#predicted').text(data.forecast);
      } else {
        alert("⚠️ Failed to fetch forecast.");
      }
    });
  }
</script>
<div class="container text-center ">
  <a href="/services" class="btn btn-outline-primary" mt>Back to Dashboard</a>
</div>

</body>
</html>
