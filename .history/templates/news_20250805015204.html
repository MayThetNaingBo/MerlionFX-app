<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>📰 FX News - Merlion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    body {
      background-color: #f8f9fa;
      padding: 20px;
    }
    .news-card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      background-color: #ffffff;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.03);
    }
    .news-title {
      font-size: 1.2rem;
      font-weight: bold;
    }
    .news-date {
      color: #888;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h3 class="mb-4">🌍 Latest FX News</h3>
    <div id="news-container">Loading news...</div>
  </div>

  <script>
    $(document).ready(function () {
      $.get("/api/news", function (data) {
        const container = $("#news-container");
        container.empty();

        if (data.articles && data.articles.length > 0) {
          data.articles.forEach(article => {
            const card = `
              <div class="news-card">
                <div class="news-title">${article.title}</div>
                <div class="news-date">${new Date(article.publishedAt).toLocaleString()}</div>
                <p>${article.description || ''}</p>
                <a href="${article.url}" target="_blank" class="btn btn-sm btn-primary">Read more</a>
              </div>
            `;
            container.append(card);
          });
        } else {
          container.html(`<div class="alert alert-warning">No news available at the moment.</div>`);
        }
      }).fail(function () {
        $("#news-container").html(`<div class="alert alert-danger">Failed to load news. Try again later.</div>`);
      });
    });
  </script>
</body>
</html>
