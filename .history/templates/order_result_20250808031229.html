<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Success - Merlion FX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="container">
    <div class="card success-card p-4 mx-auto mt-5" style="max-width: 600px;">
      <div class="text-center">
        <img src="../static/images/Merlion.png" alt="Merlion FX Logo" class="logo-img">

        <h2 class="text-success">Payment Successful!</h2>
        <p><strong>Thank you for using Merlion FX</strong></p>
      </div>
      <hr>
      <div class="mt-3">
        <p><strong>Order ID:</strong> {{ fOrderID }}</p>
        <p><strong>Status:</strong> {{ fStatus }}</p>
        <p><strong>Name:</strong> {{ fName }} {{ fSurname }}</p>
        <p><strong>Email:</strong> {{ fEmail }}</p>
        <p><strong>Unit Price:</strong> SGD {{ fUnitPrice }}</p>
        <p><strong>Quantity:</strong> {{ fQuantity }}</p>
        <p><strong>Total Amount:</strong> SGD {{ fAmount }}</p>
        <p><strong>PayPal ID:</strong> {{ fPayPalID }}</p>
      </div>
      <div class="text-center mt-4">
        <a href="/services" class="custom-gradient-button">Back to Dashboard</a>
      </div>
    </div>
  </div>
</body>
</html>
